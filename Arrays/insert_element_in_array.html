<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert element in array</title>
</head>
<body>
    <input type="text" placeholder="Enter value">
    <input type="text" placeholder="Enter index">

    <script>
        let data = [60, 30, 10, 67, 40];
        let newEl = 70;
        let position = 2; 

        console.log(data);
        

        for(let i = data.length-1; i >= 0; i--){
            if(i>=position){
                data[i+1] = data[i];
                if(i==position){
                    data[i]=newEl;
                }
            } 
        }

        console.log(data);
        
    </script>
</body>
</html>
